services:
  app:
    image: albertoocello/gpx-route-builder:latest
    # build: .   # sviluppatori: decommenta per compilare localmente
    ports:
      - "8501:8501"
      - "17777:17777"     # BRouter (opzionale — utile per debug/chiamate dirette)
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-claude}
      - AI_MODEL=${AI_MODEL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - BROUTER_URL=http://localhost:17777
    volumes:
      - ./routes:/app/routes
      - ./data:/app/data
      - segments4:/app/brouter/segments4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Ollama (opzionale) ─────────────────────────────────────────────────────
  # Attiva con: docker compose --profile ollama up
  # oppure: docker compose up ollama app
  #
  # GPU Nvidia: decommentare il blocco `deploy` sotto.
  # Modelli: docker exec gpx-rb-ollama ollama pull llama3.2
  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  segments4:
  ollama_models:
